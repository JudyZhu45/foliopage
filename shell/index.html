<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Foliopage — 股票研究</title>
  <link rel="stylesheet" href="/static/foliopage.css">
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      gap: 2rem;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, sans-serif;
    }
    .hero {
      text-align: center;
    }
    .hero h1 {
      font-size: 2rem;
      font-weight: 700;
      margin: 0 0 0.5rem;
      letter-spacing: -0.02em;
    }
    .hero p {
      color: var(--text-muted);
      margin: 0;
      font-size: 0.95rem;
    }
    .search-form {
      display: flex;
      gap: 0.5rem;
      width: 100%;
      max-width: 480px;
    }
    .search-input {
      flex: 1;
      padding: 0.65rem 1rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      color: var(--text);
      font-size: 1rem;
      outline: none;
      transition: border-color 0.15s;
    }
    .search-input:focus {
      border-color: var(--accent);
    }
    .search-btn {
      padding: 0.65rem 1.25rem;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      font-weight: 600;
      white-space: nowrap;
      transition: opacity 0.15s;
    }
    .search-btn:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }
    .status {
      font-size: 0.875rem;
      color: var(--text-muted);
      min-height: 1.5em;
      text-align: center;
    }
    .status.error {
      color: var(--down-color, #e74c3c);
    }
    .examples {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      justify-content: center;
    }
    .example-chip {
      padding: 0.3rem 0.75rem;
      border: 1px solid var(--border);
      border-radius: 99px;
      font-size: 0.82rem;
      color: var(--text-muted);
      cursor: pointer;
      background: var(--surface);
      transition: border-color 0.15s, color 0.15s;
    }
    .example-chip:hover {
      border-color: var(--accent);
      color: var(--text);
    }
  </style>
</head>
<body>
  <div class="hero">
    <h1>Foliopage</h1>
    <p>AI 驱动的本地股票研究工具</p>
  </div>

  <form class="search-form" id="searchForm">
    <input
      class="search-input"
      id="queryInput"
      type="text"
      placeholder="输入股票代码或公司名称，如 茅台 或 AAPL"
      autocomplete="off"
      autofocus
    >
    <button class="search-btn" id="searchBtn" type="submit">研究</button>
  </form>

  <div class="examples">
    <span class="example-chip" data-q="茅台">茅台</span>
    <span class="example-chip" data-q="宁德时代">宁德时代</span>
    <span class="example-chip" data-q="AAPL">AAPL</span>
    <span class="example-chip" data-q="NVDA">NVDA</span>
    <span class="example-chip" data-q="洋河股份">洋河股份</span>
  </div>

  <div class="status" id="status"></div>

  <script>
    const form = document.getElementById('searchForm');
    const input = document.getElementById('queryInput');
    const btn = document.getElementById('searchBtn');
    const status = document.getElementById('status');

    // Example chips
    document.querySelectorAll('.example-chip').forEach(chip => {
      chip.addEventListener('click', () => {
        input.value = chip.dataset.q;
        input.focus();
      });
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const query = input.value.trim();
      if (!query) return;

      btn.disabled = true;
      status.className = 'status';
      status.textContent = '正在启动研究（通常需要 1–3 分钟）…';

      try {
        const res = await fetch('/api/generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: 'initial', context: { stock_query: query } }),
        });

        if (!res.ok) {
          const err = await res.json().catch(() => ({ detail: res.statusText }));
          throw new Error(err.detail || res.statusText);
        }

        const data = await res.json();
        // Navigate to report viewer with session + request context
        const params = new URLSearchParams({
          session: data.session_id,
          request: data.request_id,
          url: data.html_url,
        });
        window.location.href = `/report?${params}`;
      } catch (err) {
        status.className = 'status error';
        status.textContent = `错误：${err.message}`;
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
